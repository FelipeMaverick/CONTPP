<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROD.BR — Sistema de Contratos</title>
<style>
:root {
  --bg:#F9FAFB;--surface:#fff;--border:#E5E7EB;--border2:#D1D5DB;
  --text:#111827;--muted:#6B7280;--hint:#9CA3AF;
  --accent:#111827;--accent-fg:#fff;
  --green:#166534;--green-bg:#DCFCE7;--green-dot:#22C55E;
  --blue:#1D4ED8;--blue-bg:#DBEAFE;
  --red:#991B1B;--red-bg:#FEE2E2;
  --yellow-bg:#FEF9C3;--yellow:#854D0E;
  --radius:10px;--font:'Inter','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;flex-shrink:0;}
.main{flex:1;overflow-y:auto;}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.logo-box{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;}
.logo-name{font-weight:600;font-size:14px;}
.nav-section{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.06em;padding:10px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--muted);font-size:13px;transition:all .15s;margin-bottom:2px;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500;}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sidebar-bottom{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.btn-outline{padding:9px;text-align:center;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);}
.btn-outline:hover{background:var(--bg);}
.btn-solid{padding:9px;text-align:center;border-radius:7px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);}
.btn-solid:hover{opacity:.85;}
.btn-solid:disabled{opacity:.5;cursor:not-allowed;}
.page{display:none;}.page.active{display:block;}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10;}
.breadcrumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.breadcrumb b{color:var(--text);font-weight:500;}
.tipo-row{display:flex;align-items:center;gap:10px;}
.tipo-label{font-size:11px;color:var(--hint);font-weight:600;letter-spacing:.05em;}
.tipo-select{font-size:13px;font-weight:500;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:6px 12px;cursor:pointer;color:var(--text);outline:none;font-family:var(--font);}
.content{padding:24px 28px;max-width:1100px;}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;}
.section-card h2{font-size:13px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);}
.badge-red{background:var(--red-bg);color:var(--red);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g1-2{display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.05em;}
.field label .req{color:#DC2626;}
.input-wrap{display:flex;align-items:center;gap:7px;border:1px solid var(--border2);border-radius:7px;padding:7px 11px;background:var(--surface);transition:border .15s;}
.input-wrap:focus-within{border-color:var(--accent);}
.input-wrap svg{width:14px;height:14px;color:var(--hint);flex-shrink:0;}
.input-wrap input{border:none;outline:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--text);width:100%;}
.input-wrap input::placeholder{color:var(--hint);}
.prefix{font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border2);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.selected{background:#EFF6FF;border-color:#93C5FD;color:var(--blue);}
.chip.add-chip{border-style:dashed;color:var(--hint);}
.chip.add-chip:hover{color:var(--accent);border-color:var(--accent);}
.dark-card{background:var(--accent);border-radius:var(--radius);padding:20px;color:#fff;display:flex;flex-direction:column;justify-content:space-between;min-height:200px;}
.dark-card h3{font-size:14px;font-weight:600;margin-bottom:6px;}
.dark-card p{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;}
.dc-icon{width:36px;height:36px;background:rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.progress-wrap{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);}
.progress-bar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:6px 0 8px;}
.progress-fill{height:3px;background:var(--green-dot);border-radius:2px;transition:width .3s;}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;}
.progress-labels span{color:rgba(255,255,255,.4);}
.progress-labels b{color:var(--green-dot);}
.steps{display:flex;align-items:center;gap:0;margin-bottom:20px;}
.step{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--hint);}
.step.active{color:var(--text);}
.step.done{color:var(--green);}
.step-num{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff;}
.step.active .step-num{background:var(--accent);border-color:var(--accent);color:#fff;}
.step-line{width:32px;height:1px;background:var(--border2);margin:0 4px;}
.notice{padding:11px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;}
.notice.ok{background:var(--green-bg);color:var(--green);}
.notice.err{background:var(--red-bg);color:var(--red);}
.notice.warn{background:var(--yellow-bg);color:var(--yellow);}
.notice.loading{background:var(--blue-bg);color:var(--blue);}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px;}
.template-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;flex-direction:column;gap:10px;}
.template-card h3{font-size:13px;font-weight:600;margin-bottom:2px;}
.template-card p{font-size:12px;color:var(--muted);}
.template-actions{display:flex;gap:6px;margin-top:4px;}
.btn-sm{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font);border:1px solid var(--border2);background:var(--surface);color:var(--text);}
.btn-sm:hover{background:var(--bg);}
.btn-sm.danger{color:var(--red);border-color:#FECACA;}
.btn-sm.danger:hover{background:var(--red-bg);}
.btn-sm.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-sm.primary:hover{opacity:.85;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:12px;padding:24px;width:480px;max-width:95vw;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;}
.modal-fields{display:flex;flex-direction:column;gap:12px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
.contracts-table{width:100%;border-collapse:collapse;}
.contracts-table th{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.contracts-table td{font-size:13px;padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.contracts-table tr:last-child td{border-bottom:none;}
.contracts-table tr:hover td{background:var(--bg);}
.upload-area{border:2px dashed var(--border2);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .15s;}
.upload-area:hover{border-color:var(--accent);background:#F8FAFF;}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-box">PB</div>
      <span class="logo-name">PROD.BR</span>
    </div>
    <div class="nav-section">CONTRATOS</div>
    <div class="nav-item active" onclick="goPage('page-form',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Novo contrato
    </div>
    <div class="nav-item" onclick="goPage('page-list',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Contratos gerados
    </div>
    <div class="nav-section" style="margin-top:8px">ADMINISTRAÇÃO</div>
    <div class="nav-item" onclick="goPage('page-admin',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Modelos de contrato
    </div>
    <div class="nav-item" onclick="goPage('page-cadastros',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Agências e clientes
    </div>
    <div class="sidebar-bottom">
      <button class="btn-outline" onclick="goStep(4)">👁 Pré-visualizar</button>
      <button class="btn-solid" id="btn-gerar" onclick="generateDoc()">⬇ Gerar .docx</button>
    </div>
  </aside>

  <div class="main">

    <!-- NOVO CONTRATO -->
    <div class="page active" id="page-form">
      <div class="topbar">
        <div class="breadcrumb">Novo contrato <span style="color:var(--border2)">/</span> <b id="step-label">Partes envolvidas</b></div>
        <div class="tipo-row">
          <span class="tipo-label">TIPO DE CONTRATO</span>
          <select class="tipo-select" id="tipo-contrato"></select>
        </div>
      </div>
      <div class="content">
        <div id="notice-form"></div>
        <div class="steps">
          <div class="step active" id="s1"><div class="step-num">1</div>Partes</div>
          <div class="step-line"></div>
          <div class="step" id="s2"><div class="step-num">2</div>Campanha</div>
          <div class="step-line"></div>
          <div class="step" id="s3"><div class="step-num">3</div>Valores</div>
          <div class="step-line"></div>
          <div class="step" id="s4"><div class="step-num">4</div>Gerar</div>
        </div>

        <!-- STEP 1 -->
        <div id="step-1">
          <div class="section-card">
            <h2>Partes envolvidas <span class="badge badge-blue">Obrigatório</span></h2>
            <div class="g2" style="margin-bottom:16px">
              <div class="field">
                <label>AGÊNCIA</label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <input id="agencia_nome" placeholder="Buscar ou digitar..." oninput="filterChips('agencia')">
                </div>
                <div class="chips" id="chips-agencia"></div>
              </div>
              <div class="field">
                <label>CLIENTE <span class="req">*</span></label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <input id="cliente" placeholder="Buscar ou digitar..." oninput="filterChips('cliente')">
                </div>
                <div class="chips" id="chips-cliente"></div>
              </div>
            </div>
            <div class="g2">
              <div class="field"><label>CNPJ DA AGÊNCIA</label><div class="input-wrap"><input id="agencia_cnpj" placeholder="12.345.678/0001-90"></div></div>
              <div class="field"><label>ENDEREÇO DA AGÊNCIA</label><div class="input-wrap"><input id="agencia_endereco" placeholder="Av. Paulista, 1000, SP"></div></div>
            </div>
          </div>
          <div class="g1-2">
            <div class="section-card">
              <h2>Dados do talent</h2>
              <div style="display:flex;flex-direction:column;gap:12px">
                <div class="field"><label>NOME COMPLETO <span class="req">*</span></label><div class="input-wrap"><input id="contratada_nome" placeholder="Maria Silva de Souza"></div></div>
                <div class="g2">
                  <div class="field"><label>CPF <span class="req">*</span></label><div class="input-wrap"><input id="contratada_cpf" placeholder="123.456.789-00"></div></div>
                  <div class="field"><label>RG <span class="req">*</span></label><div class="input-wrap"><input id="contratada_rg" placeholder="MG-12.345.678"></div></div>
                </div>
                <div class="g2">
                  <div class="field"><label>NACIONALIDADE</label><div class="input-wrap"><input id="contratada_nacionalidade" placeholder="brasileira"></div></div>
                  <div class="field"><label>FUNÇÃO <span class="req">*</span></label><div class="input-wrap"><input id="funcao_ator_modelo" placeholder="Modelo / Ator"></div></div>
                </div>
                <div class="field"><label>ENDEREÇO <span class="req">*</span></label><div class="input-wrap"><input id="contratada_endereco" placeholder="Rua das Flores, 100, São Paulo - SP"></div></div>
              </div>
            </div>
            <div class="dark-card">
              <div>
                <div class="dc-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                <h3>Resumo do contrato</h3>
                <p>Preencha todas as etapas. O jurídico poderá revisar o .docx gerado antes da assinatura.</p>
              </div>
              <div class="progress-wrap">
                <div class="progress-labels"><span>Progresso</span><b id="prog-pct">25%</b></div>
                <div class="progress-bar"><div class="progress-fill" id="prog-bar" style="width:25%"></div></div>
                <div id="prog-status" style="font-size:11px;color:rgba(255,255,255,.4)">Etapa 1 de 4</div>
              </div>
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <button class="btn-solid" onclick="goStep(2)" style="padding:10px 24px">Próxima etapa →</button>
          </div>
        </div>

        <!-- STEP 2 -->
        <div id="step-2" style="display:none">
          <div class="section-card">
            <h2>Dados da campanha <span class="badge badge-blue">Obrigatório</span></h2>
            <div style="display:flex;flex-direction:column;gap:12px">
              <div class="g2">
                <div class="field">
                  <label>MARCA <span class="req">*</span></label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="marca" placeholder="NIVEA, Dove..." oninput="filterChips('marca')">
                  </div>
                  <div class="chips" id="chips-marca"></div>
                </div>
                <div class="field"><label>TÍTULO DA CAMPANHA <span class="req">*</span></label><div class="input-wrap"><input id="titulo_campanha" placeholder="Campanha Verão 2025"></div></div>
              </div>
              <div class="field"><label>FORMATO DA CAMPANHA</label><div class="input-wrap"><input id="formato_campanha" placeholder="3 filmes de 30s + 2 fotos para redes sociais"></div></div>
              <div class="g3">
                <div class="field"><label>EXCLUSIVIDADE</label><div class="input-wrap"><input id="exclusividade" placeholder="Sim — Cosméticos"></div></div>
                <div class="field"><label>DIÁRIAS DE PRODUÇÃO</label><div class="input-wrap"><input id="diarias_producao" placeholder="2"></div></div>
                <div class="field"><label>PRAZO DE PAGAMENTO</label><div class="input-wrap"><input id="prazo_forma_pagamento" placeholder="30 dias após assinatura"></div></div>
              </div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <button class="btn-outline" onclick="goStep(1)" style="padding:10px 20px">← Voltar</button>
            <button class="btn-solid" onclick="goStep(3)" style="padding:10px 24px">Próxima etapa →</button>
          </div>
        </div>

        <!-- STEP 3 -->
        <div id="step-3" style="display:none">
          <div class="section-card">
            <h2>Valores em Reais (R$)</h2>
            <div class="g2" style="margin-bottom:12px">
              <div class="field"><label>VALOR BRUTO TOTAL</label><div class="input-wrap"><span class="prefix">R$</span><input id="valor_bruto_total_brl" placeholder="50.000,00"></div></div>
              <div class="field"><label>VALOR DA CONTRATADA</label><div class="input-wrap"><span class="prefix">R$</span><input id="valor_contratada_brl" placeholder="45.000,00"></div></div>
            </div>
            <div class="g3">
              <div class="field"><label>TAXA AGENCIAMENTO</label><div class="input-wrap"><span class="prefix">R$</span><input id="taxa_agenciamento_brl" placeholder="5.000,00"></div></div>
              <div class="field"><label>DIÁRIA EXTRA</label><div class="input-wrap"><span class="prefix">R$</span><input id="valor_diaria_extra_brl" placeholder="2.500,00"></div></div>
              <div class="field"><label>HORA EXTRA</label><div class="input-wrap"><span class="prefix">R$</span><input id="valor_hora_extra_brl" placeholder="500,00"></div></div>
            </div>
          </div>
          <div class="section-card">
            <h2>Valores em Euros (€) <span class="badge badge-yellow">Referência</span></h2>
            <div class="g2" style="margin-bottom:12px">
              <div class="field"><label>VALOR BRUTO TOTAL</label><div class="input-wrap"><span class="prefix">€</span><input id="valor_bruto_total_eur" placeholder="10.000,00"></div></div>
              <div class="field"><label>VALOR DA CONTRATADA</label><div class="input-wrap"><span class="prefix">€</span><input id="valor_contratada_eur" placeholder="9.000,00"></div></div>
            </div>
            <div class="g3">
              <div class="field"><label>TAXA AGENCIAMENTO</label><div class="input-wrap"><span class="prefix">€</span><input id="taxa_agenciamento_eur" placeholder="1.000,00"></div></div>
              <div class="field"><label>DIÁRIA EXTRA</label><div class="input-wrap"><span class="prefix">€</span><input id="valor_diaria_extra_eur" placeholder="500,00"></div></div>
              <div class="field"><label>HORA EXTRA</label><div class="input-wrap"><span class="prefix">€</span><input id="valor_hora_extra_eur" placeholder="100,00"></div></div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <button class="btn-outline" onclick="goStep(2)" style="padding:10px 20px">← Voltar</button>
            <button class="btn-solid" onclick="goStep(4)" style="padding:10px 24px">Revisar e gerar →</button>
          </div>
        </div>

        <!-- STEP 4 -->
        <div id="step-4" style="display:none">
          <div class="notice warn">✏️ <b>Revisão final.</b> Confira os dados abaixo antes de gerar o .docx. O jurídico poderá editar o arquivo Word gerado.</div>
          <div class="section-card" id="resumo-card"></div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <button class="btn-outline" onclick="goStep(3)" style="padding:10px 20px">← Voltar</button>
            <button class="btn-solid" onclick="generateDoc()" style="padding:10px 28px" id="btn-gerar-main">⬇ Gerar .docx</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTRATOS GERADOS -->
    <div class="page" id="page-list">
      <div class="topbar"><div class="breadcrumb"><b>Contratos gerados</b></div></div>
      <div class="content">
        <div class="section-card">
          <table class="contracts-table">
            <thead><tr><th>TALENTO</th><th>TIPO</th><th>CLIENTE</th><th>CAMPANHA</th><th>DATA</th><th>STATUS</th></tr></thead>
            <tbody id="contracts-list"><tr><td colspan="6" style="text-align:center;color:var(--hint);padding:32px">Nenhum contrato gerado ainda</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="page" id="page-admin">
      <div class="topbar"><div class="breadcrumb"><b>Modelos de contrato</b></div></div>
      <div class="content">
        <div id="notice-admin"></div>
        <div class="admin-grid" id="templates-grid"></div>
        <div class="section-card">
          <h2>Como preparar um novo modelo</h2>
          <ol style="padding-left:18px;display:flex;flex-direction:column;gap:8px;font-size:13px;color:var(--muted);line-height:1.7">
            <li>Abra o contrato no Word e substitua os dados variáveis pelo marcador <code style="background:var(--bg);padding:1px 6px;border-radius:4px">[.]</code></li>
            <li>Salve como <b style="color:var(--text)">.docx</b></li>
            <li>Faça upload acima — o sistema adiciona ao seletor automaticamente</li>
            <li>O jurídico pode atualizar o template a qualquer momento</li>
          </ol>
        </div>
      </div>
    </div>

    <!-- CADASTROS -->
    <div class="page" id="page-cadastros">
      <div class="topbar">
        <div class="breadcrumb"><b>Agências e clientes</b></div>
        <button class="btn-solid" onclick="openModal('modal-agencia')" style="padding:7px 16px;font-size:13px">+ Adicionar</button>
      </div>
      <div class="content">
        <div class="g2">
          <div class="section-card"><h2>Agências cadastradas</h2><div id="agencias-list"></div><button class="btn-outline" onclick="openModal('modal-agencia')" style="margin-top:14px;width:100%">+ Nova agência</button></div>
          <div class="section-card"><h2>Clientes e marcas</h2><div id="clientes-list"></div><button class="btn-outline" onclick="openModal('modal-cliente')" style="margin-top:14px;width:100%">+ Novo cliente</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAIS -->
<div class="modal-overlay" id="modal-agencia">
  <div class="modal">
    <h3>Nova agência</h3>
    <div class="modal-fields">
      <div class="field"><label>NOME</label><div class="input-wrap"><input id="m-ag-nome" placeholder="Top Models LTDA"></div></div>
      <div class="field"><label>CNPJ</label><div class="input-wrap"><input id="m-ag-cnpj" placeholder="12.345.678/0001-90"></div></div>
      <div class="field"><label>ENDEREÇO</label><div class="input-wrap"><input id="m-ag-end" placeholder="Av. Paulista, 1000, SP"></div></div>
    </div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal('modal-agencia')" style="padding:8px 18px">Cancelar</button>
      <button class="btn-solid" onclick="saveAgencia()" style="padding:8px 18px">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <h3>Novo cliente</h3>
    <div class="modal-fields">
      <div class="field"><label>NOME DO CLIENTE</label><div class="input-wrap"><input id="m-cl-nome" placeholder="Beiersdorf"></div></div>
      <div class="field"><label>MARCA PRINCIPAL</label><div class="input-wrap"><input id="m-cl-marca" placeholder="NIVEA"></div></div>
      <div class="field"><label>OUTRAS MARCAS (separadas por vírgula)</label><div class="input-wrap"><input id="m-cl-marcas" placeholder="NIVEA Men, NIVEA Baby"></div></div>
    </div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal('modal-cliente')" style="padding:8px 18px">Cancelar</button>
      <button class="btn-solid" onclick="saveCliente()" style="padding:8px 18px">Salvar</button>
    </div>
  </div>
</div>

<script>
const API = '';

function db(k,d){try{return JSON.parse(localStorage.getItem('pb_'+k)||JSON.stringify(d));}catch{return d;}}
function dbSet(k,v){localStorage.setItem('pb_'+k,JSON.stringify(v));}

function initDefaults(){
  if(!localStorage.getItem('pb_agencias')) dbSet('agencias',[
    {nome:'Taurina Produções LTDA',cnpj:'30.515.011/0001-75',endereco:'Rua Guanás, 590 - Vila Sônia, SP'},
    {nome:'MMS Comunicação Brasil',cnpj:'03.151.711/0010-46',endereco:'Rua Sansão Alves Dos Santos, 400, SP'},
  ]);
  if(!localStorage.getItem('pb_clientes')) dbSet('clientes',[
    {nome:'Beiersdorf',marca:'NIVEA',marcas:['NIVEA','NIVEA Men','NIVEA Baby','Eucerin']},
  ]);
  if(!localStorage.getItem('pb_contratos')) dbSet('contratos',[]);
}
initDefaults();

function goPage(id,navEl){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(navEl) navEl.classList.add('active');
  if(id==='page-cadastros') renderCadastroLists();
  if(id==='page-admin') loadTemplates();
  if(id==='page-list') renderContractsList();
}

function goStep(n){
  for(let i=1;i<=4;i++){
    const el=document.getElementById('step-'+i);
    if(el) el.style.display=i===n?'':'none';
    const s=document.getElementById('s'+i);
    if(s){
      s.className='step'+(i<n?' done':i===n?' active':'');
      s.querySelector('.step-num').textContent=i<n?'✓':i;
    }
  }
  const labels=['','Partes envolvidas','Dados da campanha','Valores','Revisão e geração'];
  document.getElementById('step-label').textContent=labels[n];
  const pcts=['','25%','50%','75%','100%'];
  document.getElementById('prog-pct').textContent=pcts[n];
  document.getElementById('prog-bar').style.width=pcts[n];
  document.getElementById('prog-status').textContent=`Etapa ${n} de 4`;
  if(n===4) buildResumo();
}

function g(id){return document.getElementById(id)?.value?.trim()||'';}

function getData(){
  return {
    tipo: document.getElementById('tipo-contrato')?.value || 'contrato_talent',
    contratada_nome:g('contratada_nome'), contratada_nacionalidade:g('contratada_nacionalidade')||'brasileira',
    contratada_cpf:g('contratada_cpf'), contratada_rg:g('contratada_rg'),
    contratada_endereco:g('contratada_endereco'), funcao_ator_modelo:g('funcao_ator_modelo'),
    agencia_nome:g('agencia_nome'), agencia_cnpj:g('agencia_cnpj'), agencia_endereco:g('agencia_endereco'),
    cliente:g('cliente'), marca:g('marca'), titulo_campanha:g('titulo_campanha'),
    formato_campanha:g('formato_campanha'), exclusividade:g('exclusividade')||'—',
    diarias_producao:g('diarias_producao'), prazo_forma_pagamento:g('prazo_forma_pagamento'),
    valor_bruto_total_brl:g('valor_bruto_total_brl'), valor_contratada_brl:g('valor_contratada_brl'),
    taxa_agenciamento_brl:g('taxa_agenciamento_brl'), valor_diaria_extra_brl:g('valor_diaria_extra_brl'),
    valor_hora_extra_brl:g('valor_hora_extra_brl'), valor_bruto_total_eur:g('valor_bruto_total_eur'),
    valor_contratada_eur:g('valor_contratada_eur'), taxa_agenciamento_eur:g('taxa_agenciamento_eur'),
    valor_diaria_extra_eur:g('valor_diaria_extra_eur'), valor_hora_extra_eur:g('valor_hora_extra_eur'),
  };
}

function validate(){
  const req=[['contratada_nome','Nome'],['contratada_cpf','CPF'],['contratada_rg','RG'],
    ['contratada_endereco','Endereço'],['funcao_ator_modelo','Função'],
    ['cliente','Cliente'],['marca','Marca'],['titulo_campanha','Título da campanha']];
  return req.filter(([id])=>!g(id)).map(([,l])=>l);
}

function buildResumo(){
  const d=getData();
  const row=(label,val)=>`<tr><td style="color:var(--muted);width:200px;padding:8px 12px;font-size:12px;font-weight:600;letter-spacing:.03em">${label}</td><td style="padding:8px 12px;font-size:13px">${val||'<span style="color:var(--hint)">—</span>'}</td></tr>`;
  document.getElementById('resumo-card').innerHTML=`
    <h2>Resumo do contrato</h2>
    <table style="width:100%;border-collapse:collapse">
      <tr style="background:var(--bg)"><td colspan="2" style="padding:6px 12px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em">PARTES</td></tr>
      ${row('Talent',d.contratada_nome)} ${row('CPF',d.contratada_cpf)} ${row('RG',d.contratada_rg)}
      ${row('Agência',d.agencia_nome)} ${row('Cliente',d.cliente)} ${row('Marca',d.marca)}
      <tr style="background:var(--bg)"><td colspan="2" style="padding:6px 12px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em">CAMPANHA</td></tr>
      ${row('Título',d.titulo_campanha)} ${row('Formato',d.formato_campanha)}
      ${row('Exclusividade',d.exclusividade)} ${row('Diárias',d.diarias_producao)}
      <tr style="background:var(--bg)"><td colspan="2" style="padding:6px 12px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em">VALORES</td></tr>
      ${row('Bruto total (R$)',d.valor_bruto_total_brl)} ${row('Contratada (R$)',d.valor_contratada_brl)}
      ${row('Bruto total (€)',d.valor_bruto_total_eur)} ${row('Pagamento',d.prazo_forma_pagamento)}
    </table>`;
}

async function generateDoc(){
  const missing=validate();
  if(missing.length){showNotice('notice-form','Campos obrigatórios não preenchidos: '+missing.join(', '),'err');goStep(1);return;}
  const btn=document.getElementById('btn-gerar-main');
  if(btn){btn.textContent='Gerando...';btn.disabled=true;}
  showNotice('notice-form','Gerando contrato...','loading');
  const d=getData();
  try{
    const res=await fetch(API+'/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
    if(!res.ok) throw new Error(await res.text());
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`Contrato_${(d.contratada_nome||'contrato').replace(/\s+/g,'_')}.docx`;
    a.click();URL.revokeObjectURL(url);
    showNotice('notice-form',`✅ Contrato de <b>${d.contratada_nome}</b> gerado com sucesso!`,'ok');
    const arr=db('contratos',[]);
    arr.unshift({talent:d.contratada_nome,tipo:d.tipo,cliente:d.cliente,campanha:d.titulo_campanha,data:new Date().toLocaleDateString('pt-BR'),status:'Gerado'});
    dbSet('contratos',arr);
  }catch(e){
    showNotice('notice-form','Erro ao gerar contrato: '+e.message,'err');
  }finally{
    if(btn){btn.textContent='⬇ Gerar .docx';btn.disabled=false;}
  }
}

function showNotice(id,msg,type){const el=document.getElementById(id);if(el)el.innerHTML=msg?`<div class="notice ${type}">${msg}</div>`:'';}

function renderChips(){
  renderChipsFor('agencia',db('agencias',[]),a=>{
    document.getElementById('agencia_nome').value=a.nome;
    if(a.cnpj)document.getElementById('agencia_cnpj').value=a.cnpj;
    if(a.endereco)document.getElementById('agencia_endereco').value=a.endereco;
  });
  renderChipsFor('cliente',db('clientes',[]),c=>{
    document.getElementById('cliente').value=c.nome;
    if(c.marca)document.getElementById('marca').value=c.marca;
  });
  const marcas=db('clientes',[]).flatMap(c=>(c.marcas||[c.marca]).filter(Boolean).map(m=>({nome:m})));
  renderChipsFor('marca',marcas,m=>{document.getElementById('marca').value=m.nome;});
}

function renderChipsFor(type,items,onSelect){
  const cont=document.getElementById('chips-'+type);
  if(!cont)return;
  cont.innerHTML='';
  items.forEach(item=>{
    const chip=document.createElement('div');
    chip.className='chip';chip.textContent=item.nome;
    chip.onclick=()=>{onSelect(item);cont.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');};
    cont.appendChild(chip);
  });
  const add=document.createElement('div');
  add.className='chip add-chip';add.textContent='+ Novo';
  add.onclick=()=>openModal(type==='agencia'?'modal-agencia':'modal-cliente');
  cont.appendChild(add);
}

function filterChips(type){
  const inputId=type==='marca'?'marca':type==='agencia'?'agencia_nome':'cliente';
  const q=document.getElementById(inputId)?.value.toLowerCase()||'';
  const cont=document.getElementById('chips-'+type);
  if(!cont)return;
  cont.querySelectorAll('.chip:not(.add-chip)').forEach(c=>{c.style.display=c.textContent.toLowerCase().includes(q)||!q?'':'none';});
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function saveAgencia(){
  const nome=document.getElementById('m-ag-nome').value.trim();
  if(!nome)return alert('Informe o nome.');
  const arr=db('agencias',[]);
  arr.push({nome,cnpj:document.getElementById('m-ag-cnpj').value.trim(),endereco:document.getElementById('m-ag-end').value.trim()});
  dbSet('agencias',arr);closeModal('modal-agencia');
  ['m-ag-nome','m-ag-cnpj','m-ag-end'].forEach(id=>document.getElementById(id).value='');
  renderChips();renderCadastroLists();
}

function saveCliente(){
  const nome=document.getElementById('m-cl-nome').value.trim();
  if(!nome)return alert('Informe o nome.');
  const marca=document.getElementById('m-cl-marca').value.trim();
  const outras=document.getElementById('m-cl-marcas').value.split(',').map(s=>s.trim()).filter(Boolean);
  const arr=db('clientes',[]);
  arr.push({nome,marca,marcas:[marca,...outras].filter(Boolean)});
  dbSet('clientes',arr);closeModal('modal-cliente');
  ['m-cl-nome','m-cl-marca','m-cl-marcas'].forEach(id=>document.getElementById(id).value='');
  renderChips();renderCadastroLists();
}

function renderCadastroLists(){
  const agList=document.getElementById('agencias-list');
  const clList=document.getElementById('clientes-list');
  const agencias=db('agencias',[]);
  const clientes=db('clientes',[]);
  agList.innerHTML=agencias.map((a,i)=>`<div style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px"><div style="font-size:13px;font-weight:500">${a.nome}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${a.cnpj||'—'}</div><button class="btn-sm danger" style="margin-top:8px" onclick="removeItem('agencias',${i})">Remover</button></div>`).join('')||'<div style="font-size:13px;color:var(--hint)">Nenhuma cadastrada</div>';
  clList.innerHTML=clientes.map((c,i)=>`<div style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px"><div style="font-size:13px;font-weight:500">${c.nome}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${(c.marcas||[]).join(', ')||'—'}</div><button class="btn-sm danger" style="margin-top:8px" onclick="removeItem('clientes',${i})">Remover</button></div>`).join('')||'<div style="font-size:13px;color:var(--hint)">Nenhum cadastrado</div>';
}

function removeItem(key,idx){if(!confirm('Remover?'))return;const arr=db(key,[]);arr.splice(idx,1);dbSet(key,arr);renderChips();renderCadastroLists();}

function renderContractsList(){
  const list=document.getElementById('contracts-list');
  const arr=db('contratos',[]);
  if(!arr.length){list.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--hint);padding:32px">Nenhum contrato gerado ainda</td></tr>';return;}
  list.innerHTML=arr.map(c=>`<tr><td><b>${c.talent||'—'}</b></td><td><span class="badge badge-blue">${c.tipo}</span></td><td>${c.cliente||'—'}</td><td>${c.campanha||'—'}</td><td>${c.data}</td><td><span class="badge badge-green">${c.status}</span></td></tr>`).join('');
}

async function loadTemplates(){
  const grid=document.getElementById('templates-grid');
  try{
    const res=await fetch(API+'/templates');
    const templates=await res.json();
    const select=document.getElementById('tipo-contrato');
    select.innerHTML='';
    templates.forEach(t=>{
      const opt=document.createElement('option');
      opt.value=t.key;opt.textContent=t.label;select.appendChild(opt);
    });
    grid.innerHTML=templates.map(t=>`
      <div class="template-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div style="width:38px;height:38px;background:var(--bg);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div><h3>${t.label}</h3><p>${t.file}</p></div>
          </div>
          <span class="badge badge-green">Ativo</span>
        </div>
        <div class="template-actions">
          <button class="btn-sm primary" onclick="document.getElementById('tipo-contrato').value='${t.key}';goPage('page-form',document.querySelectorAll('.nav-item')[0])">Usar</button>
        </div>
      </div>`).join('')+`
      <div class="template-card" style="border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;min-height:140px" onclick="document.getElementById('upload-tmpl').click()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--hint)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span style="font-size:13px;color:var(--muted);font-weight:500">Adicionar novo modelo</span>
        <span style="font-size:12px;color:var(--hint)">.docx com campos [.]</span>
        <input type="file" id="upload-tmpl" accept=".docx" style="display:none" onchange="uploadTemplate(this)">
      </div>`;
  }catch(e){
    grid.innerHTML=`<div class="notice err">Erro ao carregar modelos: ${e.message}</div>`;
  }
}

async function uploadTemplate(input){
  const file=input.files[0];if(!file)return;
  const fd=new FormData();fd.append('file',file);
  try{
    const res=await fetch(API+'/upload-template',{method:'POST',body:fd});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    showNotice('notice-admin',`✅ Modelo "${data.label}" adicionado com sucesso!`,'ok');
    loadTemplates();
  }catch(e){showNotice('notice-admin','Erro: '+e.message,'err');}
  input.value='';
}

document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});
});

renderChips();
loadTemplates();
goStep(1);
</script>
</body>
</html>
